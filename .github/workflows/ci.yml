name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Swift Package
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
